hydra:
  output_subdir: null
  run:  
    dir: .

# prompt for video content analysis
model_id: google/gemma-3-4b-it
model_short_name: gemma4b
dataset: FVC
task: inpredict
batch_size: 1
num_frames: 8  # 视频帧数，默认8帧
sample_strategy: uniform  # uniform: 间隔2帧采样 (0,2,4,6...), sequential: 顺序采样
para: 
  temperature: 0.000001
  use_api: false  # 本地调用
  # 4B一般不需要量化，如需更省显存可开启
  # load_in_4bit: true

top_k: 8
reference_name: coverage_0.5_reference_40
