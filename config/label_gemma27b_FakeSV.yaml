hydra:
  output_subdir: null
  run:  
    dir: .

prompt: Your task is to determine whether this video content is fake or authentic. Detect if this video is fake/manipulated. You must only return '1' for fake, or '0' for genuine.
model_id: google/gemma-3-27b-it
model_short_name: gemma27b
task: label
num_frames: 4  # 27B模型建议4帧以节省显存
sample_strategy: uniform  # uniform: 间隔2帧采样 (0,2,4,6...), sequential: 顺序采样
para:
  do_sample: false
  use_api: false  # 设置为true则调用API，false或不设置则使用本地模型
  load_in_4bit: true         # 使用4bit量化可节省约75%显存
dataset: FakeSV
data:
  split: train

# 显存优化配置
max_image_size: 224        # 降低到224以进一步节省显存（从336）
max_frames: 4              # 与num_frames保持一致
memory_cleanup_interval: 1 # 每1个样本清理一次显存（更频繁）
label_name: label_pred
