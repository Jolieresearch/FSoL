hydra:
  output_subdir: null
  run:  
    dir: .

# prompt for video content analysis
model_id: llava-hf/llava-v1.6-34b-hf
model_short_name: llava
dataset: FakeTT
task: inpredict
batch_size: 1
num_frames: 4  # 视频帧数，针对LLava 34B减少到4帧以节省显存
sample_strategy: uniform  # uniform: 间隔2帧采样 (0,2,4,6...), sequential: 顺序采样
para: 
  temperature: 0.000001
  use_api: false  # 设置为true则调用API，false或不设置则使用本地模型
  load_in_8bit: true  # 使用8bit量化节省显存（针对34B模型）
  # load_in_4bit: true  # 可选：使用4bit量化进一步节省显存
top_k: 8
reference_name: coverage_0.4_reference_20

# 显存优化配置
max_image_size: 336        # 图像最大分辨率（336是LLaVA推荐尺寸）
memory_cleanup_interval: 5 # 每5个样本清理一次显存