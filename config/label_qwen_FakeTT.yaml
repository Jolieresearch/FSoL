hydra:
  output_subdir: null
  run:  
    dir: .

prompt: Your task is to determine whether this video content is fake or authentic. Please carefully analyze the video frames and accompanying text (OCR text, transcript) to detect any signs of manipulation, deepfakes, or misleading information. Consider visual inconsistencies, unnatural movements, and content credibility. You must only return '1' for fake, or '0' for authentic.
# model_id: Qwen/Qwen3-VL-8B-Instruct
model_id: Qwen/Qwen3-VL-32B-Instruct #  
model_short_name: qwen
task: label
num_frames: 4  # 视频帧数，默认8帧
sample_strategy: uniform  # uniform: 间隔2帧采样 (0,2,4,6...), sequential: 顺序采样
para:
  do_sample: True
  use_api: false  # 设置为true则调用API，false或不设置则使用本地模型
dataset: FakeTT
data:
  split: train

# 显存优化配置
max_image_size: 512        # 图像最大分辨率（降低可节省显存）
max_frames: 16              # 最大帧数（从16帧中采样8帧）
memory_cleanup_interval: 5 # 每5个样本清理一次显存
label_name: label_pred